<!DOCTYPE html>
<html>
<head>
  <title>Live Map</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; }
    #map { height: 100vh; width: 100%; }
    #user-bar {
      position: fixed; top: 12px; right: 12px; z-index: 1000;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
      color: #fff; padding: 8px 14px; border-radius: 20px;
      font-size: 13px; display: flex; align-items: center; gap: 10px;
    }
    #user-bar a {
      color: #f87171; text-decoration: none; font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="user-bar">
    <span id="user-label">Loading...</span>
    <a href="/logout">Logout</a>
  </div>
  <div id="map"></div>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="/socket.io/socket.io.js"></script>

  <script>
    const token = localStorage.getItem("access_token");
    const user  = JSON.parse(localStorage.getItem("user") || "null");

    if (!token) {
      alert("Please sign in first");
      window.location.href = "/";
    }

    // Show user info
    if (user) {
      document.getElementById("user-label").textContent =
        `👤 ${user.name || user.sub}`;
    }

    // Socket connection authenticated with OIDC access token
    const socket = io({ auth: { token } });

    socket.on("connect_error", (err) => {
  console.error("Socket error:", err.message);
  if (err.message.includes("Authentication failed") || err.message.includes("invalid_token")) {
    // Only clear login if the token is actually invalid/expired
    localStorage.removeItem("access_token");
    localStorage.removeItem("id_token");
    localStorage.removeItem("user");
    window.location.href = "/";
  }
  // Otherwise do nothing — socket.io will automatically reconnect
});
socket.on("disconnect", (reason) => {
  console.warn("Disconnected:", reason);
  // socket.io auto-reconnects for these reasons — don't clear login
  if (reason === "io server disconnect") {
    // Server explicitly disconnected us — try reconnecting
    socket.connect();
  }
});
    // Init map (centred on India)
    const map = L.map("map").setView([20.5937, 78.9629], 5);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    const markers = {};

    // Send own location
    navigator.geolocation.watchPosition((pos) => {
      socket.emit("location:update", {
        lat: pos.coords.latitude,
        lng: pos.coords.longitude
      });
    });

    // Receive location updates
    socket.on("location:broadcast", (data) => {
      const { userId, username, lat, lng } = data;
      if (!markers[userId]) {
        markers[userId] = L.marker([lat, lng])
          .addTo(map)
          .bindPopup(username);
      } else {
        markers[userId].setLatLng([lat, lng]);
      }
    });
  </script>
</body>
</html>
